url: "https://bjfl-003.dx.commercecloud.salesforce.com/s/Prime1StudioEc/customer/account/login?lang=default"

browser: chromium
headless: false
slow_mo: 50

delay_between_accounts: 3
field_delay: 0.3

csv_file: "test_accounts.csv"

# Accept cookie consent dialog before filling the form
cookie_selector: "button:has-text('Accept')"

fields:
  - column: first_name
    selector: "[name='dwfrm_profile_customer_firstname']"
    type: text

  - column: last_name
    selector: "[name='dwfrm_profile_customer_lastname']"
    type: text

  - column: email
    selector: "[name='dwfrm_profile_customer_email']"
    type: email

  - column: password
    selector: "[name='dwfrm_profile_login_password']"
    type: password

submit_selector: "#registration"

# Terms of Service step shown after submitting the registration form
terms:
  checkbox_selector: "#is-agree"
  submit_selector: "#submitbtn"

success:
  url_contains: "/account"

results_file: "test_results.csv"
screenshots_on_failure: true
screenshots_dir: "screenshots"
